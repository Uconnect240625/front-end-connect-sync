<!-- CUConnect HTML goes here -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>U Connect</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header>
      <h1><span>U</span>Connect</h1>
      <p>Your Campus in One App</p>
    </header>

    <section class="grid">
      <div class="feature-card" onclick="openFeature('notes')">
        <img src="https://img.icons8.com/color/96/open-book--v1.png" alt="Notes Hub" />
        <span>Notes Hub</span>
      </div>
      <div class="feature-card" onclick="openFeature('pg')">
        <img src="https://img.icons8.com/color/96/bedroom.png" alt="PG Finder" />
        <span>PG Finder</span>
      </div>
      <div class="feature-card" onclick="openFeature('marketplace')">
        <img src="https://img.icons8.com/color/96/shopping-cart--v1.png" alt="Marketplace" />
        <span>Marketplace</span>
      </div>
      <div class="feature-card" onclick="openFeature('mess')">
        <img src="https://img.icons8.com/color/96/restaurant.png" alt="Mess Menu" />
        <span>Mess Menu</span>
      </div>
      <div class="feature-card" onclick="openFeature('events')">
        <img src="https://img.icons8.com/color/96/calendar--v1.png" alt="Events" />
        <span>Events</span>
      </div>
      <div class="feature-card" onclick="openFeature('help')">
        <img src="https://img.icons8.com/color/96/help.png" alt="Help Center" />
        <span>Help Center</span>
      </div>
    </section>

    <footer>
      <p>© 2025 CUConnect. All rights reserved.</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
