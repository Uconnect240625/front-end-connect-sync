<!-- Settings HTML goes here -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="styles.css">
  <title>U Connect Settings</title>
</head>
<body>

  <div class="settings-container">
    <h1>Settings</h1>

    <div class="setting-item">
      <span class="setting-label">🌙 Dark Mode</span>
      <label class="toggle-switch">
        <input type="checkbox" id="darkToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="setting-item">
      <span class="setting-label">👤 Edit Profile</span>
      <span>›</span>
    </div>

    <div class="setting-item">
      <span class="setting-label">🔐 Change Password</span>
      <span>›</span>
    </div>

    <div class="setting-item">
      <span class="setting-label">🔔 Notification Settings</span>
      <span>›</span>
    </div>

    <div class="setting-item">
      <span class="setting-label">🔒 Privacy & Security</span>
      <span>›</span>
    </div>

    <div class="setting-item">
      <span class="setting-label">🛠 Help & Support</span>
      <span>›</span>
    </div>

    <button class="btn">Logout</button>
  </div>

  <div class="footer">CUConnect v1.0 • Crafted by Kabir 🔥</div>
  <script src="script.js"></script>
</body>
</html>
