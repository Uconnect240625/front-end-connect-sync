<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Club Dashboard - U Connect</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h2>Club <span>Dashboard</span></h2>

    <button class="btn">Post New Event (₹50)</button>

    <h3>Your Events</h3>

    <div class="event-card">
      <h4>Tech Talk: AI in 2025</h4>
      <p>Date: July 10, 2025</p>
      <p>Status: <span class="status">Approved</span></p>
    </div>

    <div class="event-card">
      <h4>Open Mic Night</h4>
      <p>Date: July 18, 2025</p>
      <p>Status: <span class="status pending">Pending</span></p>
    </div>

  </div>
<script src="script.js"></script>
</body>
</html>
