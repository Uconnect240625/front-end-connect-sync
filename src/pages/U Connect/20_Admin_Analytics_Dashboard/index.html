<!-- Admin_Analytics_Dashboard HTML goes here -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>U Connect Analytics</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h2>📊 U Connect Admin Analytics</h2>

  <div class="grid">
    <div class="card">
      <div class="icon">💰</div>
      <h3>₹18,500</h3>
      <p>Total Earnings (This Month)</p>
    </div>

    <div class="card">
      <div class="icon">🧑‍🎓</div>
      <h3>1,324</h3>
      <p>Active Users</p>
    </div>

    <div class="card">
      <div class="icon">📄</div>
      <h3>438</h3>
      <p>Notes Uploaded</p>
    </div>

    <div class="card">
      <div class="icon">🧑‍🤝‍🧑</div>
      <h3>127</h3>
      <p>Roommate Listings</p>
    </div>

    <div class="card">
      <div class="icon">📢</div>
      <h3>61</h3>
      <p>Notices Posted</p>
    </div>

    <div class="card">
      <div class="icon">🛠️</div>
      <h3>19</h3>
      <p>Pending Complaints</p>
    </div>
  </div>

  <div class="charts" style="margin-top: 40px;">
    <canvas id="earningsChart" width="100%" height="100px" text-align="center"></canvas>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>

</body>
</html>
