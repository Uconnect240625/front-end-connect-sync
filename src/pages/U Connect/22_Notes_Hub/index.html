<!-- Notes_Hub HTML goes here -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>U Connect Notes Hub</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>📚 U Connect Notes Hub</h1>

    <!-- Search -->
    <input type="text" id="searchInput" placeholder="🔍 Search subjects..." />

    <!-- Subject List -->
    <div id="subjectsList" class="subjects"></div>

    <!-- Add + Upload in one row -->
    <div class="input-group">
      <input type="text" id="newSubjectInput" placeholder="✏️ Add a new subject..." />
      <button id="uploadNotesBtn" class="fab blue">📤 Upload Notes</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
