<!-- List_Your_Product HTML goes here -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Your product</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
  <h1 class="main-heading">📤 List Your Product</h1>
  <p class="subheading">You’ve paid ₹50. Now share your product with CU students.</p>

  <div class="listing-form">
    <form>
      <input type="text" placeholder="Student Name" required>
      <input type="text" placeholder="Product Title" required>
      <input type="number" placeholder="Price (₹)" required>
      <input type="url" placeholder="Image URL" required>

      <select required>
        <option value="" disabled selected>Select Category</option>
        <option>Books</option>
        <option>Electronics</option>
        <option>Clothing</option>
        <option>Stationery</option>
        <option>Others</option>
      </select>

      <input type="tel" placeholder="Contact Number" required>
      <textarea placeholder="Short Description" rows="3" required></textarea>

      <button type="submit">Submit Listing</button>
    </form>
  </div>
</div>

    <script src="script.js"></script>
</body>
</html>
